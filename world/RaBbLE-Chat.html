<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, interactive-widget=resizes-visual">
  <!-- iOS fullscreen / hide browser chrome when saved to home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="icon" type="image/x-icon" href="../icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../icons/icon-16.png">
  <title>RaBbLE — Boundless Behavioral Learning Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../aether/rabble.css">
  <link rel="stylesheet" href="css/RaBbLE-theme.css">
  <link rel="stylesheet" href="css/RaBbLE-chat.css">
</head>
<body class="chat-entry">

  <canvas id="bgCanvas"></canvas>

  <div class="rabble-scanlines"></div>
  <div class="rabble-vignette"></div>
  <div class="rabble-chromatic"></div>

  <div id="root">
    <div class="top-panel">
      <a href="../index.html" class="chat-back" onclick="if(history.length>1){history.back();return false;}">← exit</a>
      <div class="brand-text">RaBbLE</div>
      <div class="brand-sub">RaBbLE · a Boundless Behavioral Learning Engine</div>
      <div class="entity-container">
        <rabble-entity id="entityHost" class="chat-entity" mode="idle" particle-count="480" overscan="2.55"></rabble-entity>
      </div>
    </div>

    <div class="chat-container"></div>

    <div class="input-bar">
      <div class="input-wrap">
        <input type="text" class="input-field" placeholder="Type your message..." autocomplete="off" spellcheck="false">
        <button class="send-btn" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 14L14 8 2 2v4l8 2-8 2v4z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

  <script src="js/RaBbLE-bg.js"></script>
  <script src="js/RaBbLE-entity.js"></script>
  <script src="js/RaBbLE-chat.js"></script>
  <script src="js/RaBbLE-ios-install.js"></script>

</body>
</html>
