<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NeBuLA Demo — 2D & 3D Entity Rendering</title>

  <!-- Prevent iOS PWA white flash -->
  <style>html,body{background:#03000b;background-color:#03000b}</style>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- Design system + theme + WM layout -->
  <link rel="stylesheet" href="http://localhost:8000/aether/v0.0.0.0/aether.min.css">
  <link rel="stylesheet" href="css/RaBbLE-theme.css">
  <link rel="stylesheet" href="css/RaBbLE-landing.css">
  <link rel="stylesheet" href="css/RaBbLE-wm.css">

  <style>
    /* Demo-specific applet styling */
    .applet {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(18, 19, 42, 0.6);
      backdrop-filter: blur(8px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .applet-title {
      padding: 10px 12px;
      background: rgba(42, 40, 64, 0.8);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .applet-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    /* Main grid layout for demo */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      height: 100%;
      overflow: hidden;
    }

    /* Hint strip at bottom */
    .hint-strip {
      background: rgba(3, 0, 11, 0.88);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 6px 16px;
      padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dimmer);
      letter-spacing: 0.06em;
    }

    .btn {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      cursor: pointer;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 150ms;
    }

    .btn:hover {
      background: var(--cyan);
      color: var(--bg);
    }

    .btn.active {
      background: var(--magenta);
      border-color: var(--magenta);
      color: var(--bg);
    }
  </style>
</head>

<body>
  <!-- Ambient background layers -->
  <div class="floor"></div>
  <div class="horizon"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="chromatic"></div>

  <div class="shell">
    <!-- Status bar -->
    <header class="statusbar rabble-harmony-line">
      <div class="sb-left">
        <span class="brandmark">NeBuLA</span>
        <span class="sb-sep">/</span>
        <span class="sb-workspace">demo</span>
      </div>

      <div class="sb-center">
        <span class="sb-glyph">◈</span>
        <span class="sb-entity-state" id="entity-state">idle</span>
        <span class="sb-sep">·</span>
        <span class="sb-pulse">
          <span>fps </span><span class="sb-val" id="fps-display">60</span>
        </span>
      </div>

      <div class="sb-right">
        <span>canvas2d · threejs</span>
      </div>
    </header>

    <!-- Main content grid: 2D (left) + 3D (right) applets -->
    <main class="main">
      <!-- Canvas2D applet (left) -->
      <div class="applet">
        <div class="applet-title">2D Entity · Canvas2D Backend</div>
        <div class="applet-body">
          <canvas id="canvas2d" width="400" height="400"></canvas>
        </div>
      </div>

      <!-- Three.js applet (right) -->
      <div class="applet">
        <div class="applet-title">3D Entity · Three.js Backend</div>
        <div class="applet-body">
          <canvas id="canvas3d" width="400" height="400"></canvas>
        </div>
      </div>
    </main>

    <!-- Hint strip with state controls -->
    <footer class="hint-strip">
      <div style="display: flex; gap: 12px; align-items: center;">
        <span>State:</span>
        <button class="btn active" data-state="idle" onclick="setState('idle')">1: Idle</button>
        <button class="btn" data-state="thinking" onclick="setState('thinking')">2: Thinking</button>
        <button class="btn" data-state="speaking" onclick="setState('speaking')">3: Speaking</button>
      </div>
    </footer>
  </div>

  <!-- Three.js ESM build (r150+) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <!-- NeBuLA demo script -->
  <script type="module">
    import * as THREE from 'three';
    import { Runtime, Canvas2dBackend, PatternGenerator } from '../../RaBbLE-NeBuLA/src/index.js';
    import { ThreeJsBackend } from '../../RaBbLE-NeBuLA/src/backends/threejs-backend.js';

    // ═════════════════════════════════════════════════════════════════
    // 2D Canvas Backend (left applet)
    // ═════════════════════════════════════════════════════════════════
    const canvas2d = document.getElementById('canvas2d');
    const runtime2d = new Runtime(canvas2d);
    runtime2d.backend = new Canvas2dBackend(canvas2d);

    const stream2d = runtime2d.createStream('entities-2d');
    const gen = new PatternGenerator();
    const entities2d = gen.organic(100, { scale: 2, entropy: 0.3 });
    entities2d.forEach(e => stream2d.add(e));

    let state2d = 'idle';
    const updateStateButtons = () => {
      document.querySelectorAll('[data-state]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.state === state2d);
      });
    };

    // ═════════════════════════════════════════════════════════════════
    // 3D Three.js Backend (right applet)
    // ═════════════════════════════════════════════════════════════════
    const canvas3d = document.getElementById('canvas3d');
    const runtime3d = new Runtime(canvas3d);
    runtime3d.backend = new ThreeJsBackend(canvas3d, THREE);

    const stream3d = runtime3d.createStream('entities-3d');
    
    // Seed 3D scene with spherical distribution
    for (let i = 0; i < 300; i++) {
      const r = Math.random() * 3;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const entity = {
        active: true,
        geometry: ['sphere', 'box', 'tetrahedron'][i % 3],
        position: [
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.sin(phi) * Math.sin(theta),
          r * Math.cos(phi)
        ],
        rotation: [0, 0, 0],
        scale: [1, 1, 1],
        entropy: Math.random() * 0.3 + 0.2,
        opacity: 1,
        color: null,
        properties: { size: 1, emissive: 0.5 }
      };
      stream3d.add(entity);
    }

    runtime3d.animator.transition(stream3d, 'idle', 0);
    runtime3d.on('frame', () => {
      const stats = runtime3d.getStats();
      document.getElementById('fps-display').textContent = Math.round(stats.fps);
    });
    runtime3d.start();
    console.log('✓ Phase 4: Three.js backend initialized with 300 entities');

    // ═════════════════════════════════════════════════════════════════
    // 2D Runtime lifecycle and stats
    // ═════════════════════════════════════════════════════════════════
    runtime2d.on('frame', () => {
      const stats = runtime2d.getStats();
      document.getElementById('fps-display').textContent = Math.round(stats.fps);
    });

    runtime2d.animator.transition(stream2d, 'idle', 0);
    runtime2d.start();
    console.log('✓ Phase 3: Canvas2D backend initialized with 100 entities');

    // ═════════════════════════════════════════════════════════════════
    // Global state control (Phase 5: AnimationMixer)
    // ═════════════════════════════════════════════════════════════════
    window.setState = (newState) => {
      state2d = newState;
      document.getElementById('entity-state').textContent = newState;
      updateStateButtons();

      // Animate both 2D and 3D runtimes (AnimationMixer - Phase 5)
      runtime2d.animator.transition(stream2d, newState, 800);
      runtime3d.animator.transition(stream3d, newState, 800);

      console.log(`State → ${newState}`);
    };

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === '1') window.setState('idle');
      if (e.key === '2') window.setState('thinking');
      if (e.key === '3') window.setState('speaking');
    });

    console.log('✓ NeBuLA Demo ready');
    console.log('  Phase 3: Canvas2D rendering');
    console.log('  Phase 4: Three.js rendering');
    console.log('  Phase 5: AnimationMixer state transitions');
    console.log('Press 1/2/3 to change entity state (idle/thinking/speaking)');
  </script>
</body>
</html>
