<svg width="680" height="360" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>RaBbLE Portal Glyphs</title>
  <desc>Two portal glyphs — tall narrow neon ovals intersecting shadow ellipses. RaBbLE canonical logo mark.</desc>

  <defs>
    <!-- Background void -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#1a0030" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="1"/>
    </radialGradient>

    <!-- Glyph 1: magenta fill -->
    <radialGradient id="glyph1-fill" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#ff79c6"/>
      <stop offset="60%"  stop-color="#ff2d78"/>
      <stop offset="100%" stop-color="#bf0050"/>
    </radialGradient>

    <!-- Glyph 2: cyan fill -->
    <radialGradient id="glyph2-fill" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#aafffe"/>
      <stop offset="60%"  stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#009ab0"/>
    </radialGradient>

    <!-- Shared shadow gradient (ground shadow below/above glyphs) -->
    <radialGradient id="shadow1-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff2d78" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff2d78" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow2-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00f5ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="glow-magenta" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ff2d78" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-cyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#00f5ff" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="360" fill="url(#bg-glow)"/>

  <!-- ── GLYPH 1 — Magenta, shadow below ── -->
  <g transform="translate(210, 175)" filter="url(#glow-soft)">
    <!-- Ambient glow halo -->
    <ellipse cx="0" cy="0" rx="60" ry="118" fill="#ff2d78" opacity="0.08"/>
    <!-- Ground shadow -->
    <ellipse cx="0" cy="94" rx="90" ry="20" fill="url(#shadow1-g)"/>
    <!-- Dark horizon band intersecting the oval -->
    <ellipse cx="0" cy="88" rx="88" ry="19" fill="#0e0018"/>
    <!-- Main oval -->
    <ellipse cx="0" cy="0" rx="34" ry="103"
      fill="url(#glyph1-fill)"
      stroke="#ff2d78" stroke-width="2.5"
      filter="url(#glow-magenta)"/>
  </g>

  <!-- ── GLYPH 2 — Cyan, shadow above ── -->
  <g transform="translate(420, 175)" filter="url(#glow-soft)">
    <!-- Ambient glow halo -->
    <ellipse cx="0" cy="0" rx="60" ry="118" fill="#00f5ff" opacity="0.06"/>
    <!-- Sky shadow -->
    <ellipse cx="0" cy="-94" rx="100" ry="20" fill="url(#shadow2-g)"/>
    <!-- Dark horizon band -->
    <ellipse cx="0" cy="-88" rx="100" ry="19" fill="#0e0018"/>
    <!-- Main oval -->
    <ellipse cx="0" cy="0" rx="34" ry="103"
      fill="url(#glyph2-fill)"
      stroke="#00f5ff" stroke-width="2.5"
      filter="url(#glow-cyan)"/>
  </g>

</svg>
